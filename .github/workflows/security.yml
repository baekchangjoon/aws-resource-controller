name: Security — gitleaks

# Runs on:
#   - Every PR — catches a new leak before it lands on main.
#   - Every push to main — second safety net in case CI is bypassed.
#   - Weekly schedule — picks up newly published rules without needing a push.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 16 * * 0"  # 16:00 UTC Sundays ≈ 01:00 KST Mondays
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # gitleaks-action posts a comment on PRs when leaks are found
  security-events: write  # so we can also upload SARIF if we extend later

env:
  # Opt-in to Node.js 24 for actions still pinned to Node 20.
  # Required before 2026-06-02 when Node 20 stops working on the runner.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          # Free for individual / public-repo use; org accounts need GITLEAKS_LICENSE.
          # GITHUB_TOKEN is auto-injected.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
