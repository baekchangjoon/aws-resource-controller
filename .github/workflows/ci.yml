name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Opt-in to Node.js 24 for actions still pinned to Node 20.
  # Required before 2026-06-02 when Node 20 stops working on the runner.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ingest:
    name: lambda/ingest — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: lambda/ingest/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff format --check src tests
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -q

  api:
    name: lambda/api — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: lambda/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff format --check src tests
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -q

  web:
    name: web — typecheck + tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE: https://placeholder.example.com

  terraform:
    name: terraform — fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"
      - name: terraform fmt -check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: validate bootstrap
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false
          terraform -chdir=terraform/bootstrap validate
      - name: validate envs/dev
        run: |
          mkdir -p lambda/ingest/dist lambda/api/dist
          : > lambda/ingest/dist/handler.zip
          : > lambda/api/dist/handler.zip
          terraform -chdir=terraform/envs/dev init -backend=false
          terraform -chdir=terraform/envs/dev validate
